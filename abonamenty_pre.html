<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS - Panel abonamentów</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    const API_URL = 'https://script.google.com/macros/s/AKfycbw2HnusoECNVVw1lx0jffO0xaU7dxLHeWpOrfgwJtQonk-Lh1eG-oCdgmGerLsXCbqh/exec';
    const API_TOKEN = 'ad1a428187fac9e5c47fdb18b42f77780ee4e7a5cd30b29cb839f02e4842a511';

    const normalizeName = (name) => String(name || '').trim().replace(/\s+/g, ' ');

    const validateName = (name) => {
        const norm = normalizeName(name);
        if (!norm) return 'Uzupełnij imię i nazwisko.';
        if (norm.length < 3) return 'Imię i nazwisko jest za krótkie.';
        if (norm.length > 60) return 'Imię i nazwisko jest za długie.';
        return null;
    };

    const callApiGet = async (action, data = {}) => {
        const params = new URLSearchParams({ action, ...data });
        const response = await fetch(`${API_URL}?${params.toString()}`, {
            method: 'GET',
        });
        return await response.json();
    };

    const callApiPost = async (action, data = {}) => {
        const body = new URLSearchParams({
            action,
            token: API_TOKEN,
            ...data,
        });

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
            },
            body: body.toString(),
        });

        return await response.json();
    };

    const AdminSubscriptions = () => {
        const [subscriptions, setSubscriptions] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [infoMessage, setInfoMessage] = useState(null);

        const [name, setName] = useState('');
        const [dateFrom, setDateFrom] = useState('');
        const [dateTo, setDateTo] = useState('');
        const [submitting, setSubmitting] = useState(false);

        const loadSubscriptions = async () => {
            setLoading(true);
            setError(null);

            try {
                const res = await callApiGet('getSubscriptions');
                if (res.error) throw new Error(res.error);

                const items = Array.isArray(res.subscriptions) ? res.subscriptions : [];

                items.sort((a, b) => {
                    if (a.name !== b.name) return a.name.localeCompare(b.name, 'pl');
                    if (a.dateFrom !== b.dateFrom) return a.dateFrom.localeCompare(b.dateFrom);
                    return a.dateTo.localeCompare(b.dateTo);
                });

                setSubscriptions(items);
            } catch (e) {
                console.error(e);
                setError('Nie udało się załadować abonamentów.');
            } finally {
                setLoading(false);
            }
        };

        useEffect(() => {
            loadSubscriptions();
        }, []);

        const handleAdd = async () => {
            const normalizedName = normalizeName(name);
            const nameError = validateName(normalizedName);

            if (nameError) {
                setInfoMessage({ type: 'error', text: nameError });
                return;
            }

            if (!dateFrom || !dateTo) {
                setInfoMessage({ type: 'error', text: 'Uzupełnij daty OD i DO.' });
                return;
            }

            if (dateFrom > dateTo) {
                setInfoMessage({ type: 'error', text: 'Data OD nie może być późniejsza niż data DO.' });
                return;
            }

            const duplicateExists = subscriptions.some(sub =>
                normalizeName(sub.name).toLowerCase() === normalizedName.toLowerCase() &&
                sub.dateFrom === dateFrom &&
                sub.dateTo === dateTo
            );

            if (duplicateExists) {
                setInfoMessage({ type: 'error', text: 'Taki abonament już istnieje.' });
                return;
            }

            setSubmitting(true);

            try {
                const res = await callApiPost('addSubscription', {
                    name: normalizedName,
                    dateFrom,
                    dateTo
                });

                if (res.error) {
                    setInfoMessage({ type: 'error', text: res.error });
                } else {
                    setName('');
                    setDateFrom('');
                    setDateTo('');
                    setInfoMessage({ type: 'success', text: 'Dodano abonament.' });
                    await loadSubscriptions();
                }
            } catch (e) {
                console.error(e);
                setInfoMessage({ type: 'error', text: 'Błąd dodawania abonamentu.' });
            } finally {
                setSubmitting(false);
            }
        };

        const handleDelete = async (sub) => {
            if (!confirm(`Usunąć abonament: ${sub.name} (${sub.dateFrom} - ${sub.dateTo})?`)) {
                return;
            }

            setSubmitting(true);

            try {
                const res = await callApiPost('deleteSubscription', {
                    name: sub.name,
                    dateFrom: sub.dateFrom,
                    dateTo: sub.dateTo
                });

                if (res.error) {
                    setInfoMessage({ type: 'error', text: res.error });
                } else {
                    setInfoMessage({ type: 'success', text: 'Usunięto abonament.' });
                    await loadSubscriptions();
                }
            } catch (e) {
                console.error(e);
                setInfoMessage({ type: 'error', text: 'Błąd usuwania abonamentu.' });
            } finally {
                setSubmitting(false);
            }
        };

        return (
            <div className="min-h-screen flex items-center justify-center p-4">
                <div className="w-full max-w-4xl bg-white shadow-lg rounded-xl p-6">
                    <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">Panel zarządzania abonamentami</h1>
                            <p className="text-gray-600 text-sm">
                                Strona techniczna – nie udostępniaj linku zawodnikom.
                            </p>
                        </div>

                        <button
                            onClick={loadSubscriptions}
                            className="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm disabled:bg-gray-400"
                            disabled={loading || submitting}
                        >
                            Odśwież
                        </button>
                    </div>

                    {error && (
                        <div className="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
                            {error}
                        </div>
                    )}

                    {infoMessage && (
                        <div
                            className={`mb-4 rounded-lg px-4 py-2 text-sm flex justify-between items-center ${
                                infoMessage.type === 'error'
                                    ? 'bg-red-50 text-red-700 border border-red-200'
                                    : 'bg-green-50 text-green-700 border border-green-200'
                            }`}
                        >
                            <span>{infoMessage.text}</span>
                            <button
                                onClick={() => setInfoMessage(null)}
                                className="text-xs font-semibold"
                            >
                                Zamknij
                            </button>
                        </div>
                    )}

                    <div className="mb-6 border rounded-lg p-4 bg-gray-50">
                        <h2 className="font-semibold mb-3 text-gray-800">Dodaj abonament</h2>

                        <div className="grid gap-3 md:grid-cols-4">
                            <div className="md:col-span-2">
                                <label className="block text-sm text-gray-700 mb-1">
                                    Imię i nazwisko
                                </label>
                                <input
                                    type="text"
                                    className="w-full border rounded-lg px-3 py-2 text-sm"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    disabled={submitting}
                                    autoComplete="off"
                                />
                            </div>

                            <div>
                                <label className="block text-sm text-gray-700 mb-1">
                                    Od
                                </label>
                                <input
                                    type="date"
                                    className="w-full border rounded-lg px-3 py-2 text-sm"
                                    value={dateFrom}
                                    onChange={(e) => setDateFrom(e.target.value)}
                                    disabled={submitting}
                                />
                            </div>

                            <div>
                                <label className="block text-sm text-gray-700 mb-1">
                                    Do
                                </label>
                                <input
                                    type="date"
                                    className="w-full border rounded-lg px-3 py-2 text-sm"
                                    value={dateTo}
                                    onChange={(e) => setDateTo(e.target.value)}
                                    disabled={submitting}
                                />
                            </div>
                        </div>

                        <div className="mt-3">
                            <button
                                onClick={handleAdd}
                                className="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 text-sm disabled:bg-gray-400"
                                disabled={submitting}
                            >
                                {submitting ? 'Zapisywanie...' : 'Dodaj abonament'}
                            </button>
                        </div>
                    </div>

                    <div>
                        <h2 className="font-semibold mb-3 text-gray-800">Aktualne abonamenty</h2>

                        {loading ? (
                            <p className="text-gray-500 text-sm">Ładowanie...</p>
                        ) : subscriptions.length === 0 ? (
                            <p className="text-gray-400 text-sm">Brak abonamentów w systemie</p>
                        ) : (
                            <div className="border rounded-lg overflow-hidden">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-100">
                                    <tr>
                                        <th className="text-left px-3 py-2 border-b">#</th>
                                        <th className="text-left px-3 py-2 border-b">Imię i nazwisko</th>
                                        <th className="text-left px-3 py-2 border-b">Okres</th>
                                        <th className="text-right px-3 py-2 border-b">Akcje</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    {subscriptions.map((sub, index) => (
                                        <tr
                                            key={`${sub.name}-${sub.dateFrom}-${sub.dateTo}`}
                                            className="odd:bg-white even:bg-gray-50"
                                        >
                                            <td className="px-3 py-2 border-b text-gray-500">
                                                {index + 1}
                                            </td>
                                            <td className="px-3 py-2 border-b">
                                                {sub.name}
                                            </td>
                                            <td className="px-3 py-2 border-b text-gray-700">
                                                {sub.dateFrom} &nbsp;–&nbsp; {sub.dateTo}
                                            </td>
                                            <td className="px-3 py-2 border-b text-right">
                                                <button
                                                    className="px-2 py-1 text-xs bg-red-100 text-red-700 rounded hover:bg-red-200 disabled:bg-gray-200 disabled:text-gray-500"
                                                    onClick={() => handleDelete(sub)}
                                                    disabled={submitting}
                                                >
                                                    Usuń
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    ReactDOM.render(<AdminSubscriptions />, document.getElementById('root'));
</script>
</body>
</html>
